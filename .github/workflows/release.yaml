jobs:
    release:
        strategy:
            fail-fast: false
            matrix:
                include:
                    # ✅ 拆分为两个独立的 macOS 目标
                    - platform: macos-latest
                      target: aarch64-apple-darwin
                      arch: aarch64
                    - platform: macos-latest
                      target: x86_64-apple-darwin
                      arch: x86_64
                    - platform: ubuntu-24.04
                      target: ''
                      arch: ''
                    - platform: windows-latest
                      target: ''
                      arch: ''

        runs-on: ${{ matrix.platform }}

        steps:
            # ... checkout, pnpm, node, rust 安装步骤保持不变 ...
            # ⚠️ rust-toolchain 的 targets 改为只安装当前矩阵的单个 target
            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: '1.94.0'
                  targets: ${{ matrix.target }}

            # ... linux deps, pnpm install 保持不变 ...

            - name: Build Tauri App
              uses: tauri-apps/tauri-action@v0
              id: tauri-build
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tagName: ${{ github.ref_name }}
                  releaseName: 'Yihua ${{ github.ref_name }}'
                  releaseBody: 'See the assets to download this version and install.'
                  releaseDraft: true
                  prerelease: false
                  args: ${{ matrix.target != '' && format('--target {0}', matrix.target) || '' }}

    # ✅ 新增：合并 macOS 双架构为 Universal Binary
    merge-macos:
        needs: release
        runs-on: macos-latest
        steps:
            - name: Download macOS artifacts
              uses: actions/download-artifact@v4
              with:
                  pattern: '*-macos-*'
                  path: artifacts

            - name: Create Universal Binary with lipo
              run: |
                  # 根据实际产物名称调整路径
                  ARM64_BIN=$(find artifacts -name "*.app" -path "*aarch64*" | head -1)
                  X86_BIN=$(find artifacts -name "*.app" -path "*x86_64*" | head -1)

                  if [ -n "$ARM64_BIN" ] && [ -n "$X86_BIN" ]; then
                    UNIVERSAL_DIR="artifacts/universal"
                    mkdir -p "$UNIVERSAL_DIR"
                    cp -R "$ARM64_BIN" "$UNIVERSAL_DIR/"
                    APP_NAME=$(basename "$ARM64_BIN")
                    BINARY_PATH="Contents/MacOS/$(ls "$ARM64_BIN/Contents/MacOS/")"

                    lipo -create \
                      "$ARM64_BIN/$BINARY_PATH" \
                      "$X86_BIN/$BINARY_PATH" \
                      -output "$UNIVERSAL_DIR/$APP_NAME/$BINARY_PATH"

                    echo "✅ Universal binary created"
                  else
                    echo "⚠️ Could not find both architectures, skipping merge"
                  fi

            - name: Upload Universal Binary
              uses: actions/upload-artifact@v4
              with:
                  name: yihua-macos-universal
                  path: artifacts/universal/

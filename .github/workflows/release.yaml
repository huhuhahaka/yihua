name: Release

on:
    push:
        tags:
            - 'v*' # 当推送以 v 开头的 tag 时触发，例如 v0.1.0
    workflow_dispatch: # 也支持手动触发

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                include:
                    # macOS Apple Silicon (M1/M2...)
                    - platform: macos-latest
                      args: '--target aarch64-apple-darwin'
                    # macOS Intel
                    - platform: macos-latest
                      args: '--target x86_64-apple-darwin'
                    # Windows
                    - platform: windows-latest
                      args: ''

        runs-on: ${{ matrix.platform }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24 # 明确指定 Node 24
                  cache: 'pnpm' # 启用 pnpm 缓存（加速依赖安装）

            - name: Install pnpm globally via npm
              run: npm install -g pnpm@11.5.1
                # 说明：通过 npm 全局安装 pnpm，确保版本与本地一致

            - name: Add pnpm to PATH
              run: echo "$HOME/.npm-global/bin" >> $GITHUB_PATH
                # 说明：将 pnpm 的安装路径（~/.npm-global/bin）添加到环境变量 PATH 中

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

            - name: Rust cache
              uses: swatinem/rust-cache@v2
              with:
                  workspaces: './src-tauri -> target'

            - name: Install frontend dependencies
              run: pnpm install
                # 此时 pnpm 已在 PATH 中，可直接执行

            - name: Build and release Tauri app
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tagName: ${{ github.ref_name }}
                  releaseName: 'yihua ${{ github.ref_name }}'
                  releaseBody: 'See the assets to download this version and install.'
                  releaseDraft: true
                  prerelease: false
                  args: ${{ matrix.args }}

name: Release Build

on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: macos-latest
                      target: aarch64-apple-darwin
                    - platform: macos-latest
                      target: x86_64-apple-darwin
                    - platform: ubuntu-24.04
                      target: ''
                    - platform: windows-latest
                      target: ''

        runs-on: ${{ matrix.platform }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 11.5.1

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '24.16.0'
                  cache: 'pnpm'

            - name: Install Rust 1.94.0
              uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: '1.94.0'
                  targets: ${{ matrix.target }}

            - name: Install Linux dependencies
              if: matrix.platform == 'ubuntu-24.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    pkg-config libclang-dev libxcb1-dev libxrandr-dev \
                    libdbus-1-dev libpipewire-0.3-dev libwayland-dev \
                    libegl-dev libglib2.0-dev libgtk-3-dev \
                    libwebkit2gtk-4.1-dev libgbm-dev libjavascriptcoregtk-4.1-dev \
                    libsoup-3.0-dev libappindicator3-dev librsvg2-dev patchelf

            - name: Install frontend dependencies
              run: pnpm install --frozen-lockfile

            - name: Build Tauri App
              uses: tauri-apps/tauri-action@v0
              id: tauri-build
              with:
                  args: ${{ matrix.target != '' && format('--target {0}', matrix.target) || '' }}

            - name: Debug tauri build outputs
              if: always()
                # 强制使用 bash，避免 windows runner 使用 PowerShell 导致 POSIX 语法报错
              shell: bash
              run: |
                  echo "=== tauri action artifactPaths (raw) ==="
                  echo '${{ steps.tauri-build.outputs.artifactPaths }}'
                  artifact_paths='${{ steps.tauri-build.outputs.artifactPaths }}'

                  if [ -n "$artifact_paths" ]; then
                    # 如果 artifactPaths 是 JSON 数组字符串，尝试按行打印每个路径（兼容有换行或空格的路径）
                    # 在 bash 中把 JSON array 转换为行可以用 jq，但为了兼容 runner 不预装 jq，我们做两种处理：
                    # 1) 如果看起来像 ["a","b"] 这种形式，用 github expression 已在上传时处理；
                    # 2) 这里尝试简单地去掉前后方括号/引号并按逗号分割打印，作为辅助查看（仅用于 debug，不影响上传）
                    echo "Attempting to pretty-print artifact paths for debug:"
                    # remove leading/trailing brackets
                    trimmed=$(echo "$artifact_paths" | sed 's/^\s*\[\s*//; s/\s*\]\s*$//')
                    # replace "," with newline, remove surrounding quotes
                    echo "$trimmed" | sed 's/\",\"/\",\"/g' | sed 's/\",\"/\\n/g' | sed 's/^"//; s/"$//' | tr ',' '\n' | sed 's/^"//; s/"$//' | while IFS= read -r p || [ -n "$p" ]; do
                      p_trim=$(echo "$p" | sed 's/^"//; s/"$//')
                      [ -n "$p_trim" ] && echo "Listing for: $p_trim" && ls -la "$p_trim" || true
                    done
                  else
                    echo "No artifactPaths output from tauri build action for this matrix entry."
                  fi

            - name: Upload build artifacts
              if: ${{ steps.tauri-build.outputs.artifactPaths != '' }}
              uses: actions/upload-artifact@v4
              with:
                  name: tauri-${{ matrix.platform }}-${{ matrix.target || 'default' }}
                  # 将 artifactPaths 的 JSON 字符串解析为数组并用换行连接，upload-artifact 能识别多行路径
                  path: ${{ join(fromJson(steps.tauri-build.outputs.artifactPaths), '\n') }}
                  retention-days: 7

    publish:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  pattern: tauri-*
                  path: artifacts
                  merge-multiple: true
                  if-no-files-found: warn

            - name: Flatten artifacts
              run: |
                  # 确保 artifacts 目录存在，避免 find/ls 报错
                  mkdir -p artifacts

                  echo "=== Downloaded artifacts root (before flatten) ==="
                  ls -la artifacts || true

                  # 如果目录为空，给出明确错误并退出
                  if [ -z "$(ls -A artifacts 2>/dev/null)" ]; then
                    echo "::error::No artifacts were downloaded into artifacts/. Check the build job and upload-artifact step and the tauri-action outputs."
                    echo "当前 artifacts 目录 listing:"
                    ls -la artifacts || true
                    exit 1
                  fi

                  # 将嵌套目录中的文件移动到 artifacts 根目录（使用 -n 避免覆盖）
                  find artifacts -mindepth 2 -type f -exec mv -n {} artifacts/ \; || true
                  # 删除空目录
                  find artifacts -mindepth 1 -type d -empty -delete || true

                  echo "=== Final artifact list ==="
                  ls -la artifacts/

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: ${{ github.ref_name }}
                  name: 'Yihua ${{ github.ref_name }}'
                  body: 'See the assets to download this version and install.'
                  draft: true
                  prerelease: false
                  files: |
                      artifacts/*.dmg
                      artifacts/*.msi
                      artifacts/*.exe
                      artifacts/*.deb
                      artifacts/*.AppImage
                      artifacts/*.rpm
                      artifacts/*.tar.gz
                      artifacts/*.zip

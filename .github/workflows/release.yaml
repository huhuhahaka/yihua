name: Release Build

on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: macos-latest
                      target: aarch64-apple-darwin
                    - platform: macos-latest
                      target: x86_64-apple-darwin
                    - platform: ubuntu-24.04
                      target: ''
                    - platform: windows-latest
                      target: ''

        runs-on: ${{ matrix.platform }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 11.5.1

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '24.16.0'
                  cache: 'pnpm'

            - name: Install Rust 1.94.0
              uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: '1.94.0'
                  targets: ${{ matrix.target }}

            - name: Install Linux dependencies
              if: matrix.platform == 'ubuntu-24.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    pkg-config libclang-dev libxcb1-dev libxrandr-dev \
                    libdbus-1-dev libpipewire-0.3-dev libwayland-dev \
                    libegl-dev libglib2.0-dev libgtk-3-dev \
                    libwebkit2gtk-4.1-dev libgbm-dev libjavascriptcoregtk-4.1-dev \
                    libsoup-3.0-dev libappindicator3-dev librsvg2-dev patchelf

            - name: Install frontend dependencies
              run: pnpm install --frozen-lockfile

            - name: Build Tauri App
              uses: tauri-apps/tauri-action@v0
              id: tauri-build
              with:
                  args: ${{ matrix.target != '' && format('--target {0}', matrix.target) || '' }}

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: tauri-${{ matrix.platform }}-${{ matrix.target || 'default' }}
                  # 使用通配符匹配所有可能的构建目标路径，兼容 Windows/macOS/Linux
                  path: |
                      src-tauri/target/**/release/bundle/**/*.msi
                      src-tauri/target/**/release/bundle/**/*.exe
                      src-tauri/target/**/release/bundle/**/*.dmg
                      src-tauri/target/**/release/bundle/**/*.deb
                      src-tauri/target/**/release/bundle/**/*.AppImage
                      src-tauri/target/**/release/bundle/**/*.rpm
                      src-tauri/target/**/release/bundle/**/*.tar.gz
                      src-tauri/target/**/release/bundle/**/*.zip
                  retention-days: 7

    publish:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  pattern: tauri-*
                  path: artifacts
                  merge-multiple: true
                  if-no-files-found: warn

            - name: Flatten artifacts
              run: |
                  # 确保 artifacts 目录存在，避免 find/ls 报错
                  mkdir -p artifacts

                  echo "=== Downloaded artifacts root (before flatten) ==="
                  ls -la artifacts || true

                  # 如果目录为空，给出明确错误并退出
                  if [ -z "$(ls -A artifacts 2>/dev/null)" ]; then
                    echo "::error::No artifacts were downloaded into artifacts/. Check the build job and upload-artifact step and the tauri-action outputs."
                    echo "当前 artifacts 目录 listing:"
                    ls -la artifacts || true
                    exit 1
                  fi

                  # 将嵌套目录中的文件移动到 artifacts 根目录（使用 -n 避免覆盖）
                  find artifacts -mindepth 2 -type f -exec mv -n {} artifacts/ \; || true
                  # 删除空目录
                  find artifacts -mindepth 1 -type d -empty -delete || true

                  echo "=== Final artifact list ==="
                  ls -la artifacts/

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: ${{ github.ref_name }}
                  name: 'Yihua ${{ github.ref_name }}'
                  body: 'See the assets to download this version and install.'
                  draft: true
                  prerelease: false
                  files: |
                      artifacts/*.dmg
                      artifacts/*.msi
                      artifacts/*.exe
                      artifacts/*.deb
                      artifacts/*.AppImage
                      artifacts/*.rpm
                      artifacts/*.tar.gz
                      artifacts/*.zip

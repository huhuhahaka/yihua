name: Release

on:
    push:
        tags:
            - 'v*' # 当推送以 v 开头的 tag 时触发，例如 v0.1.0
    workflow_dispatch: # 也支持手动触发

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                include:
                    # macOS Apple Silicon (M1/M2...)
                    - platform: macos-latest
                      args: '--target aarch64-apple-darwin'
                    # macOS Intel
                    - platform: macos-latest
                      args: '--target x86_64-apple-darwin'
                    # Windows
                    - platform: windows-latest
                      args: ''

        runs-on: ${{ matrix.platform }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24 # 明确指定 Node 24
                  cache: 'pnpm' # 启用 pnpm 缓存
                  registry-url: 'https://registry.npmmirror.com' # 国内镜像加速（可选）

            - name: Enable Corepack (Node 官方包管理器管理工具)
              run: |
                  # 启用 Corepack（Node 16+ 内置）
                  corepack enable
                  # 激活 pnpm 11.5.1 作为默认包管理器
                  corepack prepare pnpm@11.5.1 --activate

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

            - name: Rust cache
              uses: swatinem/rust-cache@v2
              with:
                  workspaces: './src-tauri -> target'

            - name: Install frontend dependencies
              run: pnpm install

            - name: Build and release Tauri app
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tagName: ${{ github.ref_name }}
                  releaseName: 'yihua ${{ github.ref_name }}'
                  releaseBody: 'See the assets to download this version and install.'
                  releaseDraft: true
                  prerelease: false
                  args: ${{ matrix.args }}

name: Release Build

on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:

permissions:
    contents: write

jobs:
    release:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: macos-latest
                      target: aarch64-apple-darwin
                    - platform: macos-latest
                      target: x86_64-apple-darwin
                    - platform: ubuntu-24.04
                      target: ''
                    - platform: windows-latest
                      target: ''

        runs-on: ${{ matrix.platform }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 11.5.1

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '24.16.0'
                  cache: 'pnpm'

            - name: Install Rust 1.94.0
              uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: '1.94.0'
                  targets: ${{ matrix.target }}

            - name: Install Linux dependencies
              if: matrix.platform == 'ubuntu-24.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    pkg-config libclang-dev libxcb1-dev libxrandr-dev \
                    libdbus-1-dev libpipewire-0.3-dev libwayland-dev \
                    libegl-dev libglib2.0-dev libgtk-3-dev \
                    libwebkit2gtk-4.1-dev libgbm-dev libjavascriptcoregtk-4.1-dev \
                    libsoup-3.0-dev libappindicator3-dev librsvg2-dev patchelf

            - name: Install frontend dependencies
              run: pnpm install --frozen-lockfile

            - name: Build and Release Tauri App
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tagName: ${{ github.ref_name }}
                  releaseName: 'Yihua ${{ github.ref_name }}'
                  releaseBody: 'See the assets to download this version and install.'
                  releaseDraft: true
                  prerelease: false
                  args: ${{ matrix.target != '' && format('--target {0}', matrix.target) || '' }}
